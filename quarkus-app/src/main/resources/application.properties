quarkus.http.host=0.0.0.0

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:agenda}
quarkus.datasource.password=${DB_PASSWORD:agenda}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_DATABASE:agenda}

quarkus.hibernate-orm.database.generation=update

quarkus.log.console.level=INFO
quarkus.log.console.json=true
quarkus.log.console.json.pretty-print=false
quarkus.log.console.json.exception-output-type=detailed
quarkus.log.console.json.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSX
quarkus.log.console.json.additional-field.application.value=${AGENDA_LOG_APPLICATION:agenda}
quarkus.log.console.json.additional-field.application.type=string
quarkus.log.console.json.additional-field.environment.value=${AGENDA_LOG_ENVIRONMENT:local}
quarkus.log.console.json.additional-field.environment.type=string
quarkus.log.console.json.additional-field.stack.value=quarkus
quarkus.log.console.json.additional-field.stack.type=string

agenda.keycloak.base-url=${AGENDA_KEYCLOAK_BASE_URL:http://keycloak:8080}
agenda.keycloak.realm=${AGENDA_KEYCLOAK_REALM:agenda}
agenda.keycloak.client-id=${KEYCLOAK_CLIENT_ID:quarkus-app}
agenda.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:quarkus-app-secret}
agenda.auth.refresh-skew-seconds=${AGENDA_AUTH_REFRESH_SKEW_SECONDS:15}
agenda.auth.cleanup-interval=${AGENDA_AUTH_CLEANUP_INTERVAL:30m}

# OIDC / Keycloak (development defaults)
# Set KEYCLOAK_URL in your .env if you mapped Keycloak to a different host port
quarkus.oidc.auth-server-url=${KEYCLOAK_URL:http://keycloak:8080/realms/agenda}
quarkus.oidc.client-id=${KEYCLOAK_CLIENT_ID:quarkus-app}
# If you configure a confidential client, set the client secret via KEYCLOAK_CLIENT_SECRET
quarkus.oidc.credentials.secret=${KEYCLOAK_CLIENT_SECRET:}

# For API resources using Bearer tokens
quarkus.oidc.token.issuer=${KEYCLOAK_ISSUER:${KEYCLOAK_URL:http://keycloak:8080/realms/agenda}}
