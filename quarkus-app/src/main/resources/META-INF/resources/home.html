<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Agenda — Home</title>
    <link rel="stylesheet" href="/css/tailwind.css">
    <script src="/js/vendor/htmx.min.js"></script>
  </head>
  <body class="min-h-screen bg-stone-100 text-stone-900">
    <main class="mx-auto max-w-6xl px-6 py-10">
      <section class="overflow-hidden rounded-[2rem] border border-emerald-200 bg-white shadow-xl shadow-stone-300/40">
        <div class="bg-gradient-to-r from-stone-900 via-emerald-950 to-emerald-800 px-8 py-8 text-stone-50">
          <p class="text-sm font-medium uppercase tracking-[0.3em] text-emerald-100">Minha agenda</p>
          <h1 id="welcome-name" class="mt-3 text-4xl font-semibold leading-tight">Carregando sessao...</h1>
          <p id="welcome-email" class="mt-2 text-base text-emerald-50/80"></p>
        </div>

        <div class="grid gap-6 px-8 py-8 lg:grid-cols-[1.15fr_0.85fr]">
          <div>
            <section id="contacts-panel" class="space-y-6" hx-get="/api/contacts/panel" hx-trigger="load" hx-target="this" hx-swap="outerHTML">
              <div class="rounded-3xl border border-stone-200 bg-white p-6 shadow-sm">
                <p class="text-sm text-stone-500">Carregando contatos...</p>
              </div>
            </section>
          </div>

          <aside class="space-y-4 rounded-3xl border border-stone-200 bg-stone-50 p-6">
            <h2 class="text-xl font-semibold text-stone-900">Sessao ativa</h2>
            <p id="account-username" class="text-sm text-stone-700"></p>
            <p id="account-email" class="text-sm text-stone-600"></p>
            <p id="error-message" class="hidden rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"></p>
            <div class="rounded-3xl border border-stone-200 bg-white p-5 shadow-sm">
              <p class="text-sm font-medium uppercase tracking-[0.2em] text-emerald-700">Estado atual</p>
              <p class="mt-3 text-sm leading-6 text-stone-600">Sessao local, refresh transparente e logout federado continuam ativos. A agenda de contatos agora e carregada por fragments do servidor.</p>
            </div>
            <div class="flex flex-wrap gap-3 pt-2">
              <button id="refresh-user" type="button" class="rounded-2xl border border-emerald-300 px-4 py-2 font-medium text-emerald-800 transition hover:bg-emerald-100">Atualizar perfil</button>
              <button id="logout-button" type="button" class="rounded-2xl bg-stone-900 px-4 py-2 font-medium text-white transition hover:bg-stone-700">Sair</button>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script>
      const welcomeName = document.getElementById('welcome-name');
      const welcomeEmail = document.getElementById('welcome-email');
      const accountUsername = document.getElementById('account-username');
      const accountEmail = document.getElementById('account-email');
      const errorMessage = document.getElementById('error-message');
      const refreshUserButton = document.getElementById('refresh-user');
      const logoutButton = document.getElementById('logout-button');

      function redirectToLogin() {
        window.location.replace('/');
      }

      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.classList.remove('hidden');
      }

      function clearError() {
        errorMessage.textContent = '';
        errorMessage.classList.add('hidden');
      }

      function renderUser(user) {
        welcomeName.textContent = `Bem-vindo, ${user.username}`;
        welcomeEmail.textContent = user.email || 'Sem e-mail informado';
        accountUsername.textContent = `Usuario: ${user.username}`;
        accountEmail.textContent = `E-mail: ${user.email || 'Sem e-mail informado'}`;
      }

      async function loadCurrentUser() {
        clearError();
        const response = await fetch('/api/users/me', {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        });

        if (response.status === 401) {
          redirectToLogin();
          return;
        }

        if (!response.ok) {
          showError('Nao foi possivel carregar sua sessao.');
          return;
        }

        const user = await response.json();
        renderUser(user);
      }

      refreshUserButton.addEventListener('click', async () => {
        await loadCurrentUser();
      });

      logoutButton.addEventListener('click', async () => {
        clearError();

        try {
          const response = await fetch('/api/auth/session', { method: 'DELETE' });

          if (!response.ok) {
            showError('Nao foi possivel encerrar a sessao agora.');
            return;
          }

          redirectToLogin();
        } catch (error) {
          showError('Nao foi possivel encerrar a sessao agora.');
        }
      });

      document.body.addEventListener('htmx:responseError', event => {
        if (event.detail.xhr.status === 401) {
          redirectToLogin();
          return;
        }

        const panel = document.getElementById('contacts-panel');
        if (panel) {
          panel.outerHTML = `
            <section id="contacts-panel" class="space-y-6" hx-get="/api/contacts/panel" hx-trigger="load" hx-target="this" hx-swap="outerHTML">
              <div class="rounded-3xl border border-red-200 bg-red-50 p-6 shadow-sm">
                <p class="text-sm font-medium text-red-700">Nao foi possivel carregar os contatos agora.</p>
              </div>
            </section>
          `;
        }
      });

      document.body.addEventListener('htmx:sendError', () => {
        const panel = document.getElementById('contacts-panel');
        if (panel) {
          panel.outerHTML = `
            <section id="contacts-panel" class="space-y-6" hx-get="/api/contacts/panel" hx-trigger="load" hx-target="this" hx-swap="outerHTML">
              <div class="rounded-3xl border border-red-200 bg-red-50 p-6 shadow-sm">
                <p class="text-sm font-medium text-red-700">Nao foi possivel carregar os contatos agora.</p>
              </div>
            </section>
          `;
        }
      });

      loadCurrentUser();
    </script>
  </body>
</html>
