<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Agenda — Home</title>
    <link rel="stylesheet" href="/css/tailwind.css">
  </head>
  <body class="min-h-screen bg-stone-100 text-stone-900">
    <main class="mx-auto max-w-6xl px-6 py-10">
      <section class="overflow-hidden rounded-[2rem] border border-emerald-200 bg-white shadow-xl shadow-stone-300/40">
        <div class="bg-gradient-to-r from-stone-900 via-emerald-950 to-emerald-800 px-8 py-8 text-stone-50">
          <p class="text-sm font-medium uppercase tracking-[0.3em] text-emerald-100">Minha agenda</p>
          <h1 id="welcome-name" class="mt-3 text-4xl font-semibold leading-tight">Carregando sessao...</h1>
          <p id="welcome-email" class="mt-2 text-base text-emerald-50/80"></p>
        </div>

        <div class="grid gap-6 px-8 py-8 lg:grid-cols-[1.15fr_0.85fr]">
          <div class="space-y-6">
            <div class="rounded-3xl border border-stone-200 bg-stone-50 p-6">
              <div class="flex flex-wrap items-start justify-between gap-4">
                <div>
                  <h2 class="text-xl font-semibold text-stone-900">Contatos ativos</h2>
                  <p class="mt-3 text-sm leading-6 text-stone-600">Sua agenda agora consome o backend novo e mostra apenas registros ativos do usuario autenticado.</p>
                </div>
                <div class="rounded-2xl border border-emerald-200 bg-white px-4 py-3 text-right shadow-sm">
                  <p class="text-xs font-medium uppercase tracking-[0.2em] text-emerald-700">Resumo</p>
                  <p id="contact-count" class="mt-1 text-3xl font-semibold text-stone-900">0</p>
                  <p class="text-xs text-stone-500">contatos cadastrados</p>
                </div>
              </div>
            </div>

            <div class="rounded-3xl border border-stone-200 bg-white p-6 shadow-sm">
              <div class="flex items-center justify-between gap-3">
                <div>
                  <p class="text-sm font-medium uppercase tracking-[0.2em] text-emerald-700">Agenda</p>
                  <h2 class="mt-2 text-2xl font-semibold text-stone-900">Lista principal</h2>
                </div>
                <button id="refresh-contacts" type="button" class="rounded-2xl border border-emerald-300 px-4 py-2 text-sm font-medium text-emerald-800 transition hover:bg-emerald-100">Atualizar contatos</button>
              </div>
              <p id="contacts-empty" class="mt-4 rounded-2xl border border-dashed border-stone-300 bg-stone-50 px-4 py-6 text-sm text-stone-500">Nenhum contato ativo cadastrado.</p>
              <ul id="contacts-list" class="mt-4 hidden space-y-3"></ul>
            </div>
          </div>

          <aside class="space-y-4 rounded-3xl border border-stone-200 bg-stone-50 p-6">
            <h2 class="text-xl font-semibold text-stone-900">Sessao ativa</h2>
            <p id="account-username" class="text-sm text-stone-700"></p>
            <p id="account-email" class="text-sm text-stone-600"></p>
            <p id="error-message" class="hidden rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"></p>
            <p id="success-message" class="hidden rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700"></p>
            <div class="rounded-3xl border border-stone-200 bg-white p-5 shadow-sm">
              <p class="text-sm font-medium uppercase tracking-[0.2em] text-emerald-700">Novo contato</p>
              <form id="contact-form" class="mt-4 space-y-4">
                <div class="grid gap-4 sm:grid-cols-2">
                  <label class="block text-sm text-stone-700">
                    <span class="mb-1 block font-medium">Nome</span>
                    <input name="firstName" required class="w-full rounded-2xl border border-stone-300 bg-stone-50 px-4 py-3 outline-none transition focus:border-emerald-500 focus:bg-white" />
                  </label>
                  <label class="block text-sm text-stone-700">
                    <span class="mb-1 block font-medium">Sobrenome</span>
                    <input name="lastName" required class="w-full rounded-2xl border border-stone-300 bg-stone-50 px-4 py-3 outline-none transition focus:border-emerald-500 focus:bg-white" />
                  </label>
                </div>
                <label class="block text-sm text-stone-700">
                  <span class="mb-1 block font-medium">Data de nascimento</span>
                  <input name="birthDate" type="date" required class="w-full rounded-2xl border border-stone-300 bg-stone-50 px-4 py-3 outline-none transition focus:border-emerald-500 focus:bg-white" />
                </label>
                <label class="block text-sm text-stone-700">
                  <span class="mb-1 block font-medium">Telefones</span>
                  <textarea name="phoneNumbers" required rows="3" placeholder="Um telefone por linha" class="w-full rounded-2xl border border-stone-300 bg-stone-50 px-4 py-3 outline-none transition focus:border-emerald-500 focus:bg-white"></textarea>
                </label>
                <label class="block text-sm text-stone-700">
                  <span class="mb-1 block font-medium">Grau de parentesco</span>
                  <input name="relationshipDegree" class="w-full rounded-2xl border border-stone-300 bg-stone-50 px-4 py-3 outline-none transition focus:border-emerald-500 focus:bg-white" />
                </label>
                <button id="submit-contact" type="submit" class="w-full rounded-2xl bg-emerald-700 px-4 py-3 font-medium text-white transition hover:bg-emerald-600">Salvar contato</button>
              </form>
            </div>
            <div class="flex flex-wrap gap-3 pt-2">
              <button id="refresh-user" type="button" class="rounded-2xl border border-emerald-300 px-4 py-2 font-medium text-emerald-800 transition hover:bg-emerald-100">Atualizar perfil</button>
              <button id="logout-button" type="button" class="rounded-2xl bg-stone-900 px-4 py-2 font-medium text-white transition hover:bg-stone-700">Sair</button>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <script>
      const welcomeName = document.getElementById('welcome-name');
      const welcomeEmail = document.getElementById('welcome-email');
      const accountUsername = document.getElementById('account-username');
      const accountEmail = document.getElementById('account-email');
      const errorMessage = document.getElementById('error-message');
      const successMessage = document.getElementById('success-message');
      const refreshUserButton = document.getElementById('refresh-user');
      const refreshContactsButton = document.getElementById('refresh-contacts');
      const logoutButton = document.getElementById('logout-button');
      const contactForm = document.getElementById('contact-form');
      const contactCount = document.getElementById('contact-count');
      const contactsEmpty = document.getElementById('contacts-empty');
      const contactsList = document.getElementById('contacts-list');
      const submitContactButton = document.getElementById('submit-contact');

      function redirectToLogin() {
        window.location.replace('/');
      }

      function showError(message) {
        clearSuccess();
        errorMessage.textContent = message;
        errorMessage.classList.remove('hidden');
      }

      function showSuccess(message) {
        clearError();
        successMessage.textContent = message;
        successMessage.classList.remove('hidden');
      }

      function clearError() {
        errorMessage.textContent = '';
        errorMessage.classList.add('hidden');
      }

      function clearSuccess() {
        successMessage.textContent = '';
        successMessage.classList.add('hidden');
      }

      function renderUser(user) {
        welcomeName.textContent = `Bem-vindo, ${user.username}`;
        welcomeEmail.textContent = user.email || 'Sem e-mail informado';
        accountUsername.textContent = `Usuario: ${user.username}`;
        accountEmail.textContent = `E-mail: ${user.email || 'Sem e-mail informado'}`;
      }

      function formatBirthDate(value) {
        if (!value) {
          return 'Data nao informada';
        }

        const [year, month, day] = value.split('-');
        return `${day}/${month}/${year}`;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function renderContacts(contacts) {
        contactCount.textContent = String(contacts.length);

        if (!contacts.length) {
          contactsList.innerHTML = '';
          contactsList.classList.add('hidden');
          contactsEmpty.classList.remove('hidden');
          return;
        }

        contactsEmpty.classList.add('hidden');
        contactsList.classList.remove('hidden');
        contactsList.innerHTML = contacts.map(contact => {
          const phones = contact.phoneNumbers.map(phone => `<span class="rounded-full bg-stone-100 px-3 py-1 text-xs font-medium text-stone-700">${escapeHtml(phone)}</span>`).join('');
          const relationship = contact.relationshipDegree ? `<p class="text-sm text-stone-500">Parentesco: ${escapeHtml(contact.relationshipDegree)}</p>` : '';

          return `
            <li class="rounded-3xl border border-stone-200 bg-stone-50 p-5 shadow-sm">
              <div class="flex flex-wrap items-start justify-between gap-4">
                <div class="space-y-3">
                  <div>
                    <h3 class="text-lg font-semibold text-stone-900">${escapeHtml(contact.fullName)}</h3>
                    <p class="text-sm text-stone-500">Nascimento: ${formatBirthDate(contact.birthDate)}</p>
                  </div>
                  ${relationship}
                  <div class="flex flex-wrap gap-2">${phones}</div>
                </div>
                <button type="button" data-contact-id="${contact.id}" class="delete-contact rounded-2xl border border-red-200 px-4 py-2 text-sm font-medium text-red-700 transition hover:bg-red-50">Excluir</button>
              </div>
            </li>
          `;
        }).join('');
      }

      async function loadCurrentUser() {
        clearError();
        const response = await fetch('/api/users/me', {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        });

        if (response.status === 401) {
          redirectToLogin();
          return;
        }

        if (!response.ok) {
          showError('Nao foi possivel carregar sua sessao.');
          return;
        }

        const user = await response.json();
        renderUser(user);
      }

      async function loadContacts() {
        const response = await fetch('/api/contacts', {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        });

        if (response.status === 401) {
          redirectToLogin();
          return;
        }

        if (!response.ok) {
          showError('Nao foi possivel carregar os contatos.');
          return;
        }

        const contacts = await response.json();
        renderContacts(contacts);
      }

      function formPayload() {
        const formData = new FormData(contactForm);
        const phoneNumbers = String(formData.get('phoneNumbers') || '')
          .split('\n')
          .map(value => value.trim())
          .filter(Boolean);

        return {
          firstName: String(formData.get('firstName') || '').trim(),
          lastName: String(formData.get('lastName') || '').trim(),
          birthDate: String(formData.get('birthDate') || '').trim(),
          phoneNumbers,
          relationshipDegree: String(formData.get('relationshipDegree') || '').trim()
        };
      }

      async function createContact(event) {
        event.preventDefault();
        clearError();
        clearSuccess();
        submitContactButton.disabled = true;

        try {
          const response = await fetch('/api/contacts', {
            method: 'POST',
            headers: {
              'Accept': 'application/json',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(formPayload())
          });

          if (response.status === 401) {
            redirectToLogin();
            return;
          }

          if (!response.ok) {
            const error = await response.json().catch(() => ({ message: 'Nao foi possivel salvar o contato.' }));
            showError(error.message || 'Nao foi possivel salvar o contato.');
            return;
          }

          contactForm.reset();
          showSuccess('Contato salvo com sucesso.');
          await loadContacts();
        } finally {
          submitContactButton.disabled = false;
        }
      }

      async function deleteContact(contactId) {
        clearError();
        clearSuccess();
        const response = await fetch(`/api/contacts/${contactId}`, {
          method: 'DELETE',
          headers: { 'Accept': 'application/json' }
        });

        if (response.status === 401) {
          redirectToLogin();
          return;
        }

        if (!response.ok) {
          showError('Nao foi possivel excluir o contato.');
          return;
        }

        showSuccess('Contato excluido com sucesso.');
        await loadContacts();
      }

      refreshUserButton.addEventListener('click', async () => {
        await loadCurrentUser();
      });

      refreshContactsButton.addEventListener('click', async () => {
        clearError();
        clearSuccess();
        await loadContacts();
      });

      contactForm.addEventListener('submit', createContact);

      contactsList.addEventListener('click', async event => {
        const button = event.target.closest('.delete-contact');
        if (!button) {
          return;
        }

        await deleteContact(button.dataset.contactId);
      });

      logoutButton.addEventListener('click', async () => {
        clearError();
        clearSuccess();

        try {
          const response = await fetch('/api/auth/session', { method: 'DELETE' });

          if (!response.ok) {
            showError('Nao foi possivel encerrar a sessao agora.');
            return;
          }

          redirectToLogin();
        } catch (error) {
          showError('Nao foi possivel encerrar a sessao agora.');
        }
      });

      Promise.all([loadCurrentUser(), loadContacts()]);
    </script>
  </body>
</html>
