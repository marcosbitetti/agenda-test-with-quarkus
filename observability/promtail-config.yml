server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: compose_project
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: compose_service
      - target_label: job
        replacement: docker
    pipeline_stages:
      - docker: {}
      - labels:
          stream:
          compose_project:
          compose_service:
      - match:
          selector: '{compose_project="agendas",compose_service="quarkus-app"}'
          stages:
            - regex:
                source: output
                expression: '^(?:.*?)(?P<json_line>\{.*\})\s*$'
            - json:
                source: json_line
                expressions:
                  level: level
                  logger: loggerName
                  message: message
            - labels:
                level:
                logger:
            - output:
                source: json_line
